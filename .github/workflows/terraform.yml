name: Drift Detection

on:
  schedule:
    - cron: '30 2 * * *' # 8:00 AM IST

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  drift-detection:
    runs-on: self-hosted

    steps:
      - name: Checkout Infrastructure Repository
        uses: actions/checkout@v4

      - name: Checkout Drift Repository
        uses: actions/checkout@v4
        with:
          repository: test-automation-troop/drift-detection
          path: drift-repo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify Azure Login
        shell: pwsh
        run: |
          az account show

      - name: Create Reports Directory
        shell: pwsh
        run: |
          if (!(Test-Path "$env:GITHUB_WORKSPACE\reports")) {
              New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE\reports"
          }

      - name: Terraform Init
        working-directory: vm
        run: terraform init

      - name: Terraform Plan
        working-directory: vm
        run: |
          terraform plan -out="$env:GITHUB_WORKSPACE/reports/tfplan"

      - name: Export Plan JSON
        working-directory: vm
        shell: pwsh
        run: |
          terraform show -json "$env:GITHUB_WORKSPACE\reports\tfplan" > "$env:GITHUB_WORKSPACE\reports\plan.json"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r drift-repo/requirements.txt

      - name: Detect Drift
        env:
          ACCESS_TOKEN_STORAGE_ACC: ${{ secrets.ACCESS_TOKEN_STORAGE_ACC }}
          LOG_ANALYTICS_KEY: ${{ secrets.LOG_ANALYTICS_KEY }}
          LOG_ANALYTICS_WORKSPACE_ID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
        run: |
          python drift-repo/scripts/detect-drift.py reports/plan.json