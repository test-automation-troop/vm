name: Drift Detection

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  drift-detection:
    runs-on: self-hosted

    steps:

      - name: Checkout VM Repository
        uses: actions/checkout@v4

      - name: Checkout Drift Repository
        uses: actions/checkout@v4
        with:
          repository: test-automation-troop/drift-detection
          token: ${{ secrets.PAT_TOKEN }}
          path: drift-repo

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      
      - name: Verify Python
        run: |
          python --version
          pip --version


      - name: Install Python Packages
        run: |
          pip install -r drift-repo/requirements.txt

      - name: Verify Azure Login
        shell: pwsh
        run: |
          az account show

      - name: Create Reports Folder
        shell: pwsh
        run: |
          if (!(Test-Path "$env:GITHUB_WORKSPACE\reports"))
          {
            New-Item `
              -ItemType Directory `
              -Path "$env:GITHUB_WORKSPACE\reports"
          }

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        shell: pwsh
        run: |
          terraform plan `
            -out="$env:GITHUB_WORKSPACE\reports\tfplan"

      - name: Verify TFPlan Exists
        shell: pwsh
        run: |
            dir "$env:GITHUB_WORKSPACE\reports"
        
        
      - name: Show Terraform Files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.tf

      - name: Create JSON Report
        shell: pwsh
        run: |
          terraform show -json `
            "$env:GITHUB_WORKSPACE\reports\tfplan" `
            > "$env:GITHUB_WORKSPACE\reports\plan.json"

      - name: Run Drift Detection
        env:
          LOG_ANALYTICS_WORKSPACE_ID: ${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }}
          LOG_ANALYTICS_SHARED_KEY: ${{ secrets.LOG_ANALYTICS_SHARED_KEY }}
        run: |
          python drift-repo/scripts/detect-drift.py reports/plan.json
